name: Feature request
description: Suggest an improvement
labels: [enhancement]
body:
  - type: input
    id: area
    attributes:
      label: Area
      placeholder: Tool page / UX / SEO / Infrastructure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      placeholder: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe the expected behavior and scope
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
